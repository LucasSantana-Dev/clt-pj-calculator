name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

      - name: Install Playwright (chromium)
        run: npx playwright install chromium --with-deps

      - name: E2E smoke
        run: npx playwright test

      - name: Sync staging gate secrets to Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: |
          # Valores reutilizáveis (org-level quando o repo migrar para a org):
          # só sincroniza os que existirem como secret no GitHub.
          for key in DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET DISCORD_GUILD_ID; do
            value="${!key}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler pages secret put "$key" --project-name criativaria-clt-pj
              echo "synced $key"
            else
              echo "skipped $key (sem secret no GitHub)"
            fi
          done

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name criativaria-clt-pj --branch main
