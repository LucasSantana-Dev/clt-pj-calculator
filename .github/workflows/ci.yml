name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # registry-url + scope make setup-node write an auth-configured .npmrc at
      # runtime from NODE_AUTH_TOKEN — the repo's own .npmrc is gitignored (it
      # holds a real token locally), so CI must generate one this way. Without
      # it, npm ci 401s ("authentication token not provided").
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@criativaria-projects'

      # PACKAGES_READ_TOKEN: classic PAT with read:packages, needed for
      # @criativaria-projects/auth-crypto (private GitHub Packages registry —
      # GITHUB_TOKEN can't read a private package from a different repo
      # without that repo's "Manage Actions access" allowlist, which isn't
      # API-configurable). See career-tools/docs/adr/0002-shared-auth-crypto-package-defer-jwt-migration.md
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build
        env:
          VITE_GA_ID: ${{ vars.VITE_GA_ID }}

      - name: Install Playwright (chromium)
        run: npx playwright install chromium --with-deps

      - name: E2E smoke
        run: npx playwright test

      - name: Sync staging gate secrets to Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          SSO_SECRET: ${{ secrets.SSO_SECRET }}
          AUTH_HUB_URL: ${{ secrets.AUTH_HUB_URL }}
        run: |
          # Valores reutilizáveis (org-level quando o repo migrar para a org):
          # só sincroniza os que existirem como secret no GitHub.
          for key in DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET DISCORD_GUILD_ID SSO_SECRET AUTH_HUB_URL; do
            value="${!key}"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler pages secret put "$key" --project-name criativaria-clt-pj
              echo "synced $key"
            else
              echo "skipped $key (sem secret no GitHub)"
            fi
          done

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name criativaria-clt-pj --branch main
